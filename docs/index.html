<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terrana – Organize, track & share your collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F7F3EE;
      --sage: #7A9E7E;
      --sage-light: #C2D4C4;
      --sage-dark: #4A6B4E;
      --earth: #8B6F47;
      --dark: #2C2C2C;
      --mid: #6B6B6B;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Organic background shapes */
    .bg-shape {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .bg-shape-1 {
      width: 600px; height: 600px;
      background: var(--sage);
      top: -200px; left: -200px;
      animation: float1 18s ease-in-out infinite;
    }
    .bg-shape-2 {
      width: 400px; height: 400px;
      background: var(--earth);
      bottom: -150px; right: -100px;
      animation: float2 22s ease-in-out infinite;
    }
    .bg-shape-3 {
      width: 300px; height: 300px;
      background: var(--sage-light);
      top: 50%; left: 60%;
      animation: float3 15s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(40px, 30px) scale(1.05); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-30px, -40px) scale(1.08); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.1) rotate(10deg); }
    }

    /* Main content */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Leaf icon */
    .leaf-icon {
      display: inline-block;
      margin-bottom: 2rem;
      animation: fadeUp 1.2s ease 0.1s both;
    }
    .leaf-icon svg {
      width: 56px;
      height: 56px;
      fill: var(--sage);
      filter: drop-shadow(0 4px 16px rgba(122,158,126,0.3));
    }

    /* Brand name */
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6rem);
      letter-spacing: 0.12em;
      color: var(--dark);
      line-height: 1;
      margin-bottom: 1rem;
      animation: fadeUp 1.2s ease 0.2s both;
    }

    /* Divider */
    .divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--sage), transparent);
      margin: 1.2rem auto;
      animation: fadeUp 1.2s ease 0.3s both;
    }

    /* Tagline */
    .tagline {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 3rem;
      animation: fadeUp 1.2s ease 0.4s both;
    }

    /* Contact */
    .contact-label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sage-dark);
      margin-bottom: 0.6rem;
      animation: fadeUp 1.2s ease 0.5s both;
    }

    .contact-email {
      display: inline-block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--sage-dark);
      text-decoration: none;
      border-bottom: 1px solid var(--sage-light);
      padding-bottom: 2px;
      transition: color 0.3s, border-color 0.3s;
      animation: fadeUp 1.2s ease 0.6s both;
    }
    .contact-email:hover {
      color: var(--earth);
      border-color: var(--earth);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 1.5rem;
      width: 100%;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sage-light);
      z-index: 1;
      animation: fadeUp 1.2s ease 0.8s both;
    }
  </style>
</head>
<body>

  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  <div class="bg-shape bg-shape-3"></div>

  <div class="container">

    <div class="leaf-icon">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4C18 4 8 18 8 32c0 10 6 18 14 22 0-8 2-16 8-22-4 8-4 16-2 24 2 0 4 0 4 0 2-8 2-18 8-26-2 10-2 20 0 26 10-4 16-14 16-24C56 18 46 4 32 4z"/>
      </svg>
    </div>

    <h1>Terrana</h1>

    <div class="divider"></div>

    <p class="tagline">Organize, track &amp; share your collection</p>

    <p class="contact-label">Contact</p>
    <a class="contact-email" href="mailto:tommi1008@gmail.com">tommi1008@gmail.com</a>

  </div>

  <footer>© 2026 Terrana &nbsp;·&nbsp; All rights reserved</footer>

</body>
</html>
